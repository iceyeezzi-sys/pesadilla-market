    .alert-box { position: absolute; border: 2px solid #f00; background: rgba(255,0,0,0.2); color: #fff; padding: 10px; font-weight: bold; z-index: 10005; animation: window-jitter 0.05s infinite; }

    .update-tick { animation: tick-glitch 0.3s ease; }
    @keyframes tick-glitch { 
      0% { transform: scale(1); opacity: 1; filter: blur(0); }
      50% { transform: scale(1.1) skew(5deg); opacity: 0.5; filter: hue-rotate(90deg) blur(2px); }
      100% { transform: scale(1); opacity: 1; filter: blur(0); }

    /* RESPONSIVE PORTAL */
    @media (max-width: 768px) {

      #hacking-overlay .terminal-window { width: 95%; padding: 1rem; bottom: 20px; }

    /* FLOATING WINDOWS */
    .glitch-window { position: absolute; background: #000; border: 1px solid #f00; z-index: 1000004; padding: 10px; box-shadow: 0 0 20px #f00; display: flex; align-items: center; justify-content: center; animation: window-jitter 0.05s infinite; }

    .terminal-content { width: 0%; height: 2px; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #0f0; box-shadow: 0 0 50px rgba(0,255,0,0.5); position: relative; }
    .terminal-ready .terminal-content { width: 90%; height: 80%; max-width: 800px; transition: width 0.4s ease, height 0.4s 0.4s ease; padding: 3rem; background: rgba(0,5,0,0.95); }
    .neon-text-green { font-family: 'JetBrains Mono'; color: #0f0; text-shadow: 0 0 10px #0f0; }
    .metadata-line { font-size: 10px; color: rgba(0,255,0,0.3); width: 100%; margin-bottom: 5px; }

    /* GREEN NEON UI */
    .access-form-card.neon-green { border: 1px solid #0f0; box-shadow: 0 0 50px rgba(0,255,0,0.3); background: rgba(0,10,0,0.9); position: relative; }
    .neon-green-bar { width: 100%; height: 4px; background: #0f0; box-shadow: 0 0 20px #0f0; margin: 20px 0; animation: pulse-green 1.5s infinite; }

    .moving-code-bg { position: absolute; inset: 0; z-index: -1; opacity: 0.15; pointer-events: none; }

    /* HIDE CURSOR UTILITY */

    /* CUSTOM CURSOR (CIRCLES) */
    #cursor-custom { position: fixed; width: 40px; height: 40px; pointer-events: none; z-index: 1000001; transform: translate(-50%, -50%); display: flex; align-items: center; justify-content: center; }

    .iti { width: 100% !important; margin-bottom: 2rem; }

    .iti__country-list { background: #000 !important; border: 1px solid var(--p-red) !important; color: #fff !important; font-family: 'JetBrains Mono' !important; font-size: 11px !important; }

</head>
<body>

  <script src="assets/cursor.js"></script>
  <script>
    window.addEventListener('load', () => {
      setTimeout(() => document.body.classList.add('crt-on'), 100);
      setTimeout(() => document.body.classList.add('crt-expand'), 600);
      setTimeout(() => document.getElementById('crt-overlay').style.display = 'none', 1000);
    });

    const wpInput = document.querySelector("#whatsapp");
    const itl = window.intlTelInput(wpInput, { initialCountry: 'bo', separateDialCode: true, utilsScript: 'https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js' });

    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzYB9QkYIrJzqINZMYsBJHAXahDaEhB18S3WgRtlHWVitD0o_sF_QdJ4ZbG3qkT4JEtA/exec";
    let pandoraCode = "";

    // GENERATE RANDOM 4-DIGIT CODE FOR EACH USER
    function generateCode() { return Math.floor(1000 + Math.random() * 9000).toString(); }

    document.getElementById('launchForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const userName = document.getElementById('userName').value;
      const overlay = document.getElementById('hacking-overlay');
      const logo = document.getElementById('logo-pesadilla');
      const log = document.getElementById('hack-log');
      const statusText = document.getElementById('status-text');
      const pctText = document.getElementById('pct-text');
      const core = document.getElementById('matrix-core');
      const quads = document.getElementById('quads');
      const terminal = document.getElementById('terminal-v');
      const voidBg = document.getElementById('retro-void');
      const binaryGhost = document.getElementById('binary-ghost');
      
      // GENERATE UNIQUE CODE FOR THIS SESSION
      pandoraCode = generateCode();
      
      // FULLSCREEN & HIDE CURSOR
      try { document.documentElement.requestFullscreen(); } catch(e) {}
      document.body.classList.add('no-cursor', 'no-cursor-custom');
      
      document.getElementById('sfx-voice').play().catch(()=>{});
      overlay.style.display = 'block';
      logo.classList.add('melted');

      const canvas = document.getElementById('rain');
      const ctx = canvas.getContext('2d');
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const drops = new Array(Math.floor(canvas.width / 20)).fill(0);
      let rainColor = '#00ff41';
      const rainInt = setInterval(() => {
        ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = rainColor; ctx.font = '14px monospace';
        drops.forEach((y, i) => {
          ctx.fillText(Math.floor(Math.random()*16).toString(16).toUpperCase(), i*20, y*20);
          if(y*20 > canvas.height && Math.random() > 0.985) drops[i] = 0; drops[i]++;
        });
      }, 50);

      let p = 0;
      const pInt = setInterval(() => {
        if(p < 99) {
          p += Math.random() > 0.3 ? Math.random()*5 : -2;
          p = Math.max(0, p); pctText.innerText = Math.floor(p) + '%';
        }
      }, 400);

      setTimeout(() => {
        rainColor = '#ffb100'; statusText.innerText = "NEURAL_HANDSHAKE_INIT...";
        const logs = ["PUSH EBP", "MOV EBP, ESP", "ADDR_0xDEADBEEF", "KERNEL_BREACH_L2", "DNA_VERIFIED"];
        const logInt = setInterval(() => {
          const l = document.createElement('div');
          l.innerText = `[${new Date().toLocaleTimeString()}] ${logs[Math.floor(Math.random()*logs.length)]}`;
          log.appendChild(l); log.scrollTop = log.scrollHeight;
        }, 120);
        setTimeout(() => clearInterval(logInt), 10000);
      }, 5000);

      setTimeout(() => {
        core.style.opacity = '1';
        const coreInt = setInterval(() => {
          core.innerHTML = "";
          for(let i=0; i<15; i++) {
            const d = document.createElement('div');
            d.className = Math.random() > 0.5 ? 'core-green' : 'core-red';
            d.innerText = Math.random().toString(36).substring(2, 25);
            core.appendChild(d);
          }
        }, 80);
        setTimeout(() => clearInterval(coreInt), 8000);
      }, 8000);

      setTimeout(() => {
        rainColor = '#f00'; statusText.innerText = "!!_SYSTEM_COLLAPSE_DETECTED_!!";
        quads.style.display = 'grid';
        
        const pgInt = setInterval(() => {
          for(let i=1; i<=4; i++) {
            const el = document.getElementById('pg-'+i);
            el.style.opacity = Math.random() > 0.6 ? "0.8" : "0";
            el.style.filter = `hue-rotate(${Math.random()*360}deg) contrast(2)`;
            el.style.transform = `scale(${1 + Math.random()*0.5}) translate(${Math.random()*20-10}px, ${Math.random()*20-10}px)`;
          }
        }, 80);
        
        const neg = setInterval(() => { overlay.style.filter = Math.random() > 0.5 ? 'invert(1) saturate(5)' : 'none'; }, 60);
        setTimeout(() => { clearInterval(neg); clearInterval(pgInt); overlay.style.filter = 'none'; }, 5500);
      }, 15500);

      // FETCH CODE (SAVE DATA & SYNC) - USING GET FOR MAX RELIABILITY
      const finalUrl = `${WEB_APP_URL}?nombre=${encodeURIComponent(userName)}&whatsapp=${encodeURIComponent(itl.getNumber())}&code=${encodeURIComponent(pandoraCode)}`;
      fetch(finalUrl, { method: 'GET', mode: 'no-cors' })
        .catch(err => console.error("Sync error:", err));

      // 21s: TERROR CLIMAX
      setTimeout(() => {
        core.style.display = 'none'; quads.style.display = 'none'; terminal.style.display = 'none';
        voidBg.style.display = 'block'; binaryGhost.style.display = 'block';
        
        const terrorInt = setInterval(() => {
          const p = document.createElement('div'); p.className = 'horror-text';
          p.style.top = Math.random()*100+'%'; p.style.left = Math.random()*100+'%';
          p.style.fontSize = Math.random()*10 + 'rem';
          const msgs = ["NO ESCAPE", "VOID", "HELP", "PESADILLA"];
          p.innerText = msgs[Math.floor(Math.random()*msgs.length)];
          p.style.animation = 'flash-text 0.1s forwards';
          document.body.appendChild(p);
          setTimeout(() => p.remove(), 100);

          if(Math.random() > 0.7) {
            const f = document.createElement('div'); f.className = 'glitch-face';
            f.style.top = Math.random()*100+'%'; f.style.left = Math.random()*100+'%';
            f.innerText = "( >_< )\n/| |\\\n/ \\";
            f.style.animation = 'terror-flicker 0.1s infinite';
            document.body.appendChild(f);
            setTimeout(() => f.remove(), 300);
          }
        }, 60);

        rainColor = '#fff'; canvas.classList.add('glitch-tear');
        setTimeout(() => { clearInterval(terrorInt); }, 5500); // Ends at 26.5s
      }, 21000);

      // 26.5s: CYBER ASASULT (HEX BLAST + SHAKE + WINDOWS)
      setTimeout(() => {
        overlay.classList.add('screen-shake');
        const blast = document.getElementById('cyber-blast');
        blast.style.display = 'block';
        
        const blastInt = setInterval(() => {
          const line = document.createElement('div');
          line.innerText = Array.from({length: 50}, () => Math.floor(Math.random()*256).toString(16).padStart(2, '0')).join(' ');
          blast.appendChild(line);
          if(blast.childNodes.length > 50) blast.removeChild(blast.firstChild);
          
          if(Math.random() > 0.8) {
            const win = document.createElement('div'); win.className = 'glitch-window';
            win.style.top = Math.random()*70+'%'; win.style.left = Math.random()*70+'%';
            win.style.zIndex = "10002";
            win.innerHTML = `<img src="assets/ROSTRO_DISTORSIONADO.png">`;
            document.getElementById('glitch-overlay-container').appendChild(win);
            setTimeout(() => win.remove(), 300);
          }

          if(Math.random() > 0.9) {
            const alert = document.createElement('div'); alert.className = 'alert-box';
            alert.style.top = Math.random()*80+'%'; alert.style.left = Math.random()*80+'%';
            alert.innerText = "!! CRITICAL_BREACH !!";
            document.body.appendChild(alert);
            setTimeout(() => alert.remove(), 200);
          }
        }, 40);

        setTimeout(() => { 
          clearInterval(blastInt); 
          blast.style.display = 'none'; 
          overlay.classList.remove('screen-shake');
        }, 8500); // Ends at 35s
      }, 26500);

      // 35s: GHOST REVEAL (NEGATIVE FLICKER TU-TU-TU)
      setTimeout(() => {
        canvas.style.display = 'none';
        const ghost = document.getElementById('ghost-reveal');
        ghost.style.display = 'block';
        ghost.innerHTML = `<div class="text-[9px] text-red-600 mb-6 font-bold tracking-[0.8em]">BYPASS_SUCCESSFUL</div>`;
        
        const flickerInt = setInterval(() => {
          document.body.classList.toggle('negative-mode');
          overlay.style.opacity = Math.random() > 0.5 ? "1" : "0.5";
        }, 50);

        const code = pandoraCode;
        for(let i=0; i<code.length; i++) {
          const s = document.createElement('span'); s.className = 'falling-digit';
          s.style.animationDelay = (i * 0.4) + 's'; s.innerText = code[i];
          ghost.appendChild(s);
        }

        setTimeout(() => { 
          clearInterval(flickerInt); 
          document.body.classList.remove('negative-mode');
        }, 3000); // Ends at 38s
      }, 35000);

      // 38s: FINAL TRANSITION
      setTimeout(() => { overlay.style.display = 'none'; showVerificationUI(userName); }, 38000);
    });

    function showVerificationUI(name) {
      document.body.classList.remove('no-cursor', 'no-cursor-custom');
      const card = document.getElementById('form-card');
      card.classList.add('neon-green');
      card.innerHTML = `
        <div class="moving-code-bg" id="card-code-bg"></div>
        <div class="text-center space-y-6 py-2 relative z-10">
          <h2 class="font-black uppercase tracking-[0.5em] text-[9px] text-green-500 italic">Access_Terminal_Bypass</h2>
          <div class="neon-green-bar"></div>
          <div class="py-6 border-y border-green-600/10 bg-green-950/20">
            <div class="text-[8px] text-green-500/30 uppercase mb-2 tracking-[0.4em]">Decrypted_Key:</div>
            <div class="text-white text-6xl font-black tracking-widest drop-shadow-[0_0_20px_#0f0]">${pandoraCode}</div>
          </div>
          <div class="pt-2 space-y-4">
            <input type="text" id="inputCode" maxlength="4" placeholder="INTRODUCE_LLAVE" class="text-center text-lg tracking-[0.6em] font-mono border-b border-green-600 bg-transparent outline-none w-full text-white py-2">
            <button id="btnVerify" class="btn-submit" style="background:#0f0; color:#000; padding: 0.8rem 0;">[ EJECUTAR_BYPASS ]</button>
          </div>
        </div>
      `;
      
      // PERSISTENT CODE RAIN IN CARD
      const cardBg = document.getElementById('card-code-bg');
      setInterval(() => {
        const line = document.createElement('div');
        line.style.position = 'absolute'; line.style.left = Math.random()*100+'%';
        line.style.top = '-20px'; line.style.fontSize = '8px'; line.style.color = '#0f0';
        line.style.fontFamily = 'monospace'; line.innerText = Math.random().toString(36).substr(2, 5);
        line.style.animation = 'fall 2s linear forwards';
        cardBg.appendChild(line);
        setTimeout(() => line.remove(), 2000);
      }, 100);

      document.getElementById('btnVerify').addEventListener('click', () => {
        const input = document.getElementById('inputCode').value;
        // ACCEPTS BOTH SESSION CODE AND THE SECRET MASTER KEY
        if (input === pandoraCode || input === "6666") {
          const term = document.getElementById('success-terminal');
          document.getElementById('term-user').innerText = name.toUpperCase();
          document.getElementById('term-ip').innerText = `192.168.${Math.floor(Math.random()*255)}.${Math.floor(Math.random()*255)}`;
          document.getElementById('term-date').innerText = new Date().toLocaleString();
          
          term.style.display = 'flex';
          setTimeout(() => term.classList.add('terminal-ready'), 100);
          
          setTimeout(() => {
            localStorage.setItem('pesadilla_access', 'true'); 
            window.location.href = 'store.html';
          }, 5000);
        }
      });

    }
    
    // COUNTDOWN LOGIC (7 DAYS PERSISTENT)
    let targetDate = localStorage.getItem('pesadilla_deadline');
    if (!targetDate) {
      targetDate = new Date().getTime() + (7 * 24 * 60 * 60 * 1000);
      localStorage.setItem('pesadilla_deadline', targetDate);
    }

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = targetDate - now;

      if (distance < 0) {
        document.querySelector(".time-block").parentElement.innerHTML = "<span class='text-red-600 font-black uppercase tracking-widest'>Protocolo_Activo</span>";
        return;
      }

      const d = Math.floor(distance / (1000 * 60 * 60 * 24)).toString().padStart(2, '0');
      const h = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)).toString().padStart(2, '0');
      const m = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60)).toString().padStart(2, '0');
      const s = Math.floor((distance % (1000 * 60)) / 1000).toString().padStart(2, '0');

      const updateVal = (id, val) => {
        const el = document.getElementById(id);
        if (el && el.innerText !== val) {
          el.innerText = val;
          el.classList.remove('update-tick');
          void el.offsetWidth;
          el.classList.add('update-tick');
        }
      };

      updateVal("days", d);
      updateVal("hours", h);
      updateVal("minutes", m);
      updateVal("seconds", s);
    }
    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
